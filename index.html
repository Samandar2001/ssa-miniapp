<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Singapore Skills Academy</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root, body.light{
    --sec:#f0f0f4; --text:#141416; --hint:#8b8b90;
    --link:#2f8fed; --btn:#7c1c3a; --btn-text:#ffffff; --accent:#7c1c3a; --card:#ffffff;
    --line:#e3e2e8;
  }
  body.dark{
    --sec:#0e0f12; --text:#f0f0f2; --hint:#9a9aa0;
    --link:#6ab3f3; --btn:#a83557; --btn-text:#ffffff; --accent:#e86f92; --card:#1c1d22;
    --line:#2b2c31;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--sec);color:var(--text);font-size:16px;line-height:1.5}
  .wrap{max-width:600px;margin:0 auto;padding:12px 12px 84px}
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:100;max-width:600px;margin:0 auto;
    display:flex;background:var(--card);border-top:1px solid var(--line);
    box-shadow:0 -2px 14px rgba(0,0,0,.08);padding-bottom:env(safe-area-inset-bottom,0)}
  .tabitem{flex:1;border:none;background:none;color:var(--hint);cursor:pointer;
    font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 0 7px;transition:color .12s}
  .tabitem .ti-ic{font-size:21px;line-height:1;transition:transform .12s}
  .ti-av{width:23px;height:23px;border-radius:50%;object-fit:cover;display:block}
  .ti-av.ini{background:linear-gradient(135deg,var(--accent),#b03a5b);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .tabitem.active .ti-av{box-shadow:0 0 0 2px var(--accent)}
  .tabitem .ti-lb{font-size:11px;font-weight:600;letter-spacing:.1px}
  .tabitem.active{color:var(--accent)}
  .tabitem.active .ti-ic{transform:translateY(-1px) scale(1.1)}
  .tabitem:active .ti-ic{transform:scale(.85)}
  header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
  .brand{font-weight:800;font-size:17px;color:var(--accent);line-height:1.15}
  .brand small{display:block;font-weight:500;color:var(--hint);font-size:11px;margin-top:2px}
  .langs{display:flex;gap:5px;flex-shrink:0}
  .lang{border:none;background:var(--card);color:var(--text);border:1px solid var(--line);
        border-radius:18px;padding:5px 10px;font-size:13px;cursor:pointer;font-weight:600}
  .lang.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .lang.avatar{padding:0;overflow:hidden;width:32px;height:32px;border-radius:50%}
  .lang.avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .lang.avatar.ini{background:linear-gradient(135deg,var(--accent),#b03a5b);color:#fff;
        border:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .coinchip{border:1px solid var(--line);background:var(--card);color:var(--text);
        border-radius:18px;padding:6px 12px;font-size:14px;font-weight:800;cursor:pointer;
        display:flex;align-items:center;gap:4px;white-space:nowrap}
  .coinchip:active{transform:scale(.95)}
  .iconbtn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
        display:flex;align-items:center;justify-content:center;
        background:var(--sec);color:var(--accent);transition:transform .2s}
  .iconbtn svg{width:20px;height:20px}
  .iconbtn:active{transform:rotate(90deg) scale(.9)}
  .phero:after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;
    border-radius:50%;background:rgba(255,255,255,.14);pointer-events:none}
  .phero .pbody{position:relative;z-index:1;min-width:0}
  .credrow{padding:11px 0;border-top:1px solid var(--line)}
  .credrow:first-of-type{border-top:none}
  .credrow .cl{font-size:12px;color:var(--hint);margin-bottom:6px;font-weight:600}
  .credline{display:flex;align-items:center;gap:8px}
  .credval{flex:1;min-width:0;font-family:ui-monospace,Menlo,Consolas,monospace;
    background:var(--sec);border-radius:9px;padding:8px 11px;font-weight:700;font-size:14px;
    letter-spacing:.3px;word-break:break-all}
  .qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:2px 0 12px}
  .qtile{background:var(--card);border-radius:14px;padding:12px 4px;text-align:center;
    cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .08s}
  .qtile:active{transform:scale(.94)}
  .qtile.off{opacity:.4}
  .qtile .qi{font-size:22px;line-height:1}
  .qtile .ql{font-size:11px;color:var(--hint);margin-top:5px;font-weight:600}
  .phero{position:relative;overflow:hidden;border-radius:18px;padding:18px;margin-bottom:12px;
    color:#fff;background:linear-gradient(135deg,var(--btn),var(--accent));
    box-shadow:0 10px 26px -10px rgba(124,28,58,.6);display:flex;align-items:center;gap:14px}
  .phero .pav{width:58px;height:58px;border-radius:50%;object-fit:cover;flex-shrink:0;
    border:2px solid rgba(255,255,255,.6)}
  .phero .pav.ini{background:rgba(255,255,255,.22);display:flex;align-items:center;
    justify-content:center;font-size:24px;font-weight:800}
  .phero .pnm{font-weight:800;font-size:19px;line-height:1.15;word-break:break-word}
  .phero .psub{font-size:13px;opacity:.92;margin-top:3px}
  .pbadge{display:inline-block;background:rgba(255,255,255,.22);border-radius:10px;
    padding:2px 10px;font-size:12px;font-weight:700;margin-top:7px}
  .pstats{display:flex;gap:10px;margin-bottom:12px}
  .pstat{flex:1;background:var(--card);border-radius:14px;padding:12px 6px;text-align:center;
    box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .pstat .v{font-weight:800;font-size:17px}
  .pstat .l{font-size:11px;color:var(--hint);margin-top:3px;font-weight:600}
  .pcard{background:var(--card);border-radius:16px;padding:2px 14px 8px;margin-bottom:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .pcard .ph{font-weight:700;font-size:12px;color:var(--hint);padding:12px 0 2px;
    text-transform:uppercase;letter-spacing:.4px}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:11px 0;border-top:1px solid var(--line)}
  .crow:first-of-type{border-top:none}
  .crow .cl{font-size:13px;color:var(--hint);flex-shrink:0}
  .crow .cv{font-weight:700;font-size:14px;text-align:right;word-break:break-word}
  .crow .cv.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
  .cbtn{border:none;background:var(--sec);color:var(--accent);border-radius:8px;
    padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
  .cbtn:active{transform:scale(.9)}
  .childsel{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px}
  .childsel::-webkit-scrollbar{display:none}
  .childsel .chip{white-space:nowrap;border:1px solid var(--line);background:var(--card);
    color:var(--text);border-radius:18px;padding:7px 15px;font-size:14px;font-weight:700;
    cursor:pointer;flex-shrink:0}
  .childsel .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .lvcard{padding:14px}
  .lvhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .lvbadge{font-weight:800;font-size:17px}
  .lvnext{font-size:13px;color:var(--hint);font-weight:700}
  .lvbar{height:11px;border-radius:6px;background:var(--sec);overflow:hidden}
  .lvfill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--btn),var(--accent));
    transition:width .7s cubic-bezier(.2,.7,.3,1)}
  .lvmax{color:var(--accent);font-weight:800;font-size:14px}
  .setcard{background:var(--card);border-radius:16px;padding:2px 14px;margin-bottom:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:13px 0;border-top:1px solid var(--line)}
  .setrow:first-child{border-top:none}
  .setrow .sl{display:flex;align-items:center;gap:12px;font-weight:600;font-size:15px}
  .setrow .si{font-size:19px;width:24px;text-align:center;flex-shrink:0}
  .setrow a.slink{color:var(--link);text-decoration:none;font-weight:700;font-size:14px}
  .seg{display:flex;gap:3px;background:var(--sec);border-radius:12px;padding:3px}
  .seg button{border:none;background:none;color:var(--text);border-radius:9px;padding:6px 12px;
    font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1}
  .seg button.on{background:var(--card);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .sw{width:48px;height:28px;border-radius:20px;background:var(--line);position:relative;
    cursor:pointer;transition:background .2s;flex-shrink:0}
  .sw.on{background:var(--accent)}
  .sw .knob{position:absolute;width:22px;height:22px;top:3px;left:3px;background:#fff;
    border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.35);transition:transform .2s}
  .sw.on .knob{transform:translateX(20px)}
  .appfoot{text-align:center;color:var(--hint);font-size:12px;margin:14px 0 4px;line-height:1.5}
  .tform label{display:block;font-size:12px;color:var(--hint);font-weight:600;margin:12px 0 5px}
  .tform input{width:100%;border:1px solid var(--line);background:var(--sec);color:var(--text);
    border-radius:12px;padding:12px 14px;font-size:16px;font-family:inherit;outline:none;
    transition:border-color .15s}
  .tform input:focus{border-color:var(--accent)}
  .wheelwrap{position:relative;width:270px;max-width:80vw;margin:8px auto 16px}
  .wheel{position:relative;width:100%;padding-top:100%;border-radius:50%;overflow:hidden;
    border:6px solid var(--card);box-shadow:0 12px 34px -12px rgba(0,0,0,.55)}
  .wface{position:absolute;inset:0;border-radius:50%;
    transition:transform 4.4s cubic-bezier(.12,.82,.18,1)}
  .wlab{position:absolute;top:50%;left:50%;color:#fff;font-weight:800;font-size:13px;
    white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.45)}
  .wptr{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:3;width:0;height:0;
    border-left:13px solid transparent;border-right:13px solid transparent;
    border-top:22px solid var(--accent);filter:drop-shadow(0 2px 2px rgba(0,0,0,.35))}
  .whub{position:absolute;top:50%;left:50%;width:46px;height:46px;transform:translate(-50%,-50%);
    background:var(--card);border-radius:50%;z-index:2;display:flex;align-items:center;
    justify-content:center;font-size:22px;box-shadow:0 2px 10px rgba(0,0,0,.35)}
  .hwcard{background:linear-gradient(180deg,var(--card),var(--sec));border-radius:18px;
    padding:14px 12px 16px;margin-bottom:14px;text-align:center;
    box-shadow:0 8px 24px -10px rgba(0,0,0,.35);border:1px solid var(--line)}
  .hwtitle{font-weight:800;font-size:16px}
  .hwfree{display:block;font-size:12px;color:var(--hint);font-weight:600;margin-top:2px}
  @keyframes appIn{from{opacity:0}to{opacity:1}}
  #app.anim{animation:appIn .22s ease}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);
    border-top-color:var(--accent);animation:spin .8s linear infinite;margin:44px auto}
  .card,.rev,.qtile,.pstat,.btn,.coinchip,.iconbtn,.tabitem{will-change:transform}
  /* Ketma-ket (stagger) chiqish */
  @keyframes itemIn{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:none}}
  .stg>*{animation:itemIn .42s cubic-bezier(.2,.7,.3,1) both}
  .stg>*:nth-child(2){animation-delay:.045s}
  .stg>*:nth-child(3){animation-delay:.09s}
  .stg>*:nth-child(4){animation-delay:.135s}
  .stg>*:nth-child(5){animation-delay:.18s}
  .stg>*:nth-child(6){animation-delay:.225s}
  .stg>*:nth-child(7){animation-delay:.27s}
  .stg>*:nth-child(8){animation-delay:.315s}
  .stg>*:nth-child(n+9){animation-delay:.36s}
  /* Coin chip puls */
  @keyframes cpulse{0%{transform:scale(1)}45%{transform:scale(1.16)}100%{transform:scale(1)}}
  .coinchip.puls{animation:cpulse .45s ease}
  /* Konfetti */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
  .confetti span{position:absolute;top:-34px;will-change:transform}
  @keyframes fall{to{transform:translateY(112vh) rotate(560deg);opacity:.85}}
  /* Banner sirg'alib kirishi */
  @keyframes bnIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
  .banner{animation:bnIn .32s ease}
  /* Skeleton (miltillovchi) yuklash */
  @keyframes shim{100%{background-position:-200% 0}}
  .skel{border-radius:12px;margin-bottom:10px;
    background:linear-gradient(90deg,var(--card) 25%,var(--line) 37%,var(--card) 63%);
    background-size:200% 100%;animation:shim 1.15s infinite}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .card{background:var(--card);border-radius:16px;padding:16px;cursor:pointer;
        box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .08s}
  .card:active{transform:scale(.96)}
  .card .em{font-size:28px;line-height:1}
  .badge{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;
        justify-content:center;color:#fff;box-shadow:0 6px 16px -4px rgba(0,0,0,.35)}
  .badge svg{width:26px;height:26px}
  .card .nm{font-weight:700;margin-top:12px;font-size:15px}
  .card .pr{color:var(--accent);font-size:13px;margin-top:3px;font-weight:600}
  .btn{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;
       font-weight:700;cursor:pointer;margin-top:10px;color:var(--btn-text);
       background:linear-gradient(135deg,var(--btn),var(--accent));
       box-shadow:0 6px 18px -6px rgba(124,28,58,.55)}
  .btn:active{transform:translateY(1px);opacity:.9}
  .btn.sec{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .rowbtns{display:flex;gap:10px}
  .rowbtns .btn{flex:1;min-width:0}
  .banner{position:relative;overflow:hidden;border-radius:16px;padding:16px 18px;
    margin-bottom:14px;color:#fff;box-shadow:0 8px 22px -8px rgba(0,0,0,.4)}
  .banner .bt{font-weight:800;font-size:17px;line-height:1.2}
  .banner .bx{font-size:13px;margin-top:5px;opacity:.95;line-height:1.35;max-width:78%}
  .banner .bemoji{position:absolute;right:10px;top:50%;transform:translateY(-50%);
    font-size:66px;opacity:.22;line-height:1;pointer-events:none}
  .banner .bbtn{margin-top:12px;border:none;background:#fff;color:var(--accent);
    font-weight:800;font-size:13px;padding:8px 16px;border-radius:20px;cursor:pointer;
    box-shadow:0 3px 10px -3px rgba(0,0,0,.35)}
  .banner .bbtn:active{transform:scale(.96)}
  .bdots{display:flex;gap:5px;margin-top:11px}
  .bdots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.45);
    transition:width .2s;cursor:pointer}
  .bdots span.on{background:#fff;width:16px;border-radius:3px}
  .tabs{display:flex;gap:6px;overflow-x:auto;margin:12px 0 10px;padding-bottom:2px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;border:none;background:var(--card);color:var(--text);
       border:1px solid var(--line);border-radius:18px;padding:8px 14px;font-size:14px;cursor:pointer}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .content{background:var(--card);border-radius:16px;padding:16px;font-size:15px;
           box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .content .row{margin:5px 0}
  .content b{font-weight:700}
  .content code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--sec);
                padding:2px 7px;border-radius:6px;font-size:14px}
  .back{display:inline-flex;align-items:center;gap:5px;background:var(--card);
        border:1px solid var(--line);color:var(--text);font-size:14px;cursor:pointer;
        padding:9px 16px;margin-bottom:10px;border-radius:20px;font-weight:600;
        box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .back:active{transform:scale(.96)}
  h2{font-size:21px;margin:4px 0 2px}
  .muted{color:var(--hint);font-size:14px}
  .rev{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;
       box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .rev .who{font-weight:700;margin-bottom:2px}
  .contact .row{margin:8px 0;font-size:15px}
  .contact a{color:var(--link);text-decoration:none}
  .srow{margin:6px 0 16px}
  .slbl{font-weight:700;margin-bottom:8px;font-size:15px}
  .mcat{font-weight:800;font-size:13px;color:var(--accent);margin:16px 2px 7px;
        text-transform:uppercase;letter-spacing:.5px}
  .pmedia{position:relative;height:132px;border-radius:12px;overflow:hidden;margin-bottom:10px;
        display:flex;align-items:center;justify-content:center}
  .pmedia img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .pemoji{font-size:56px;line-height:1;filter:drop-shadow(0 2px 5px rgba(0,0,0,.3))}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="spin"></div></div>
<nav class="tabbar" id="tabbar"></nav>

<script>
"use strict";
var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

// Kunduzgi/tungi rejim
var THEME="light";
try{ THEME = localStorage.getItem("ssa_theme") || ((tg && tg.colorScheme==="dark")?"dark":"light"); }catch(e){}
function applyTheme(){ document.body.classList.remove("light","dark"); document.body.classList.add(THEME); }
function toggleTheme(){ THEME=(THEME==="dark")?"light":"dark";
  try{localStorage.setItem("ssa_theme",THEME);}catch(e){} applyTheme(); render(); }
applyTheme();

// Tugma bosilganda ovoz + tebranish
var SOUND="on", AC=null;
try{ SOUND = (localStorage.getItem("ssa_sound")==="off")?"off":"on"; }catch(e){}
function beep(){
  if(SOUND!=="on") return;
  try{
    if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    var t=AC.currentTime;
    // Yumshoq lowpass — tiniq, lekin qattiq/o'tkir emas
    var lp=AC.createBiquadFilter(); lp.type="lowpass";
    lp.frequency.setValueAtTime(5200,t);
    lp.frequency.exponentialRampToValueAtTime(1500,t+0.11);
    lp.Q.value=0.7;
    lp.connect(AC.destination);
    // Asosiy "pop" toni — mayin pasayuvchi sinus
    var o=AC.createOscillator(), g=AC.createGain();
    o.type="sine"; o.frequency.setValueAtTime(780,t);
    o.frequency.exponentialRampToValueAtTime(540,t+0.09);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.15,t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
    o.connect(g); g.connect(lp);
    o.start(t); o.stop(t+0.15);
    // Qisqa yorqin "tiniqlik" qatlami (tap hissi)
    var o2=AC.createOscillator(), g2=AC.createGain();
    o2.type="triangle"; o2.frequency.setValueAtTime(1560,t);
    g2.gain.setValueAtTime(0.0001,t);
    g2.gain.exponentialRampToValueAtTime(0.05,t+0.004);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    o2.connect(g2); g2.connect(lp);
    o2.start(t); o2.stop(t+0.06);
  }catch(e){}
}
function haptic(){ try{ if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light"); }catch(e){} }
function toggleSound(){ SOUND=(SOUND==="on")?"off":"on";
  try{localStorage.setItem("ssa_sound",SOUND);}catch(e){} if(SOUND==="on")beep(); render(); }
function setTheme(v){ THEME=v; try{localStorage.setItem("ssa_theme",v);}catch(e){} applyTheme(); render(); }
function setSound(v){ SOUND=v; try{localStorage.setItem("ssa_sound",v);}catch(e){} if(v==="on")beep(); render(); }
document.addEventListener("click", function(e){
  var el=e.target.closest && e.target.closest(".btn,.lang,.tab,.card,.back,.rev,.tabitem,.coinchip,.bbtn,.cbtn,.seg,.sw,.iconbtn,.qtile,.chip");
  if(el){ beep(); haptic(); }
}, true);

// Bannerni barmoq bilan surib almashtirish (swipe)
var _bnx=null, _bny=null;
document.addEventListener("touchstart", function(e){
  var b=e.target.closest && e.target.closest(".banner");
  if(b && e.touches[0]){ _bnx=e.touches[0].clientX; _bny=e.touches[0].clientY; }

function tweenCoin(from,to){
  if(_ctw&&window.cancelAnimationFrame) cancelAnimationFrame(_ctw);
  var dur=650, t0=null;
  var chip=document.getElementById("coinchip");
  if(chip&&to>from){ chip.classList.remove("puls"); void chip.offsetWidth; chip.classList.add("puls"); }
  function step(ts){
    if(t0==null) t0=ts;
    var p=Math.min(1,(ts-t0)/dur), e=1-Math.pow(1-p,3);
    COINDISP=from+(to-from)*e; paintCoinChip();
    if(p<1){ _ctw=requestAnimationFrame(step); } else { COINDISP=to; paintCoinChip(); _ctw=null; }
  }
  if(window.requestAnimationFrame) _ctw=requestAnimationFrame(step);
  else { COINDISP=to; paintCoinChip(); }
}
function setCoins(v){
  v=Math.round(+v||0); MYCOINS=v;

      return '<span class="'+(k===i?"on":"")+'" onclick="event.stopPropagation();bannerGo('+k+')"></span>';}).join("")+'</div>'):"";

      +esc(b.link||"")+'\')">'+esc(b.btn)+'</button>'):"";

// ---- Omad g'ildiragi ----
var WSEG=[], WROT=0, SPINNING=false, WTIMER=null, WSTAT=null;
function loadWheelStat(cb){
  var url=marketApi("/wheel"), initData=(tg&&tg.initData)||"";
  if(!url||!initData){ WSTAT={can:false}; if(cb)cb(); return; }
  fetch(url+"?initData="+encodeURIComponent(initData))
    .then(function(r){return r.json();})
    .then(function(d){ WSTAT=d||{can:false}; if(d&&d.segments)WSEG=d.segments; if(cb)cb(); })
    .catch(function(){ WSTAT={can:false}; if(cb)cb(); });
}
function wheelMarkup(){
  var n=WSEG.length||1, seg=360/n;
  var labs=WSEG.map(function(a,i){ var ang=i*seg+seg/2;
    return '<span class="wlab" style="transform:translate(-50%,-50%) rotate('+ang+'deg) translateY(-84px)">'+nf(a)+'</span>';
  }).join("");
  return '<div class="wheelwrap"><div class="wptr"></div>'
    +'<div class="wheel"><div class="wface" id="wface" style="background:'+wheelBg()+'">'+labs+'</div></div>'
    +'<div class="whub">🎡</div></div>';
}
// Home'dagi doira — faqat aylantirish mumkin bo'lsa chiqadi (aylantirilgach yo'qoladi)
function paintHomeWheel(){
  var el=document.getElementById("homewheel"); if(!el) return;
  if(!WSTAT){ el.innerHTML=""; loadWheelStat(function(){ if(view.name==="home") paintHomeWheel(); }); return; }
  if(!WSTAT.can || !WSEG.length){ el.innerHTML=""; return; }
  WROT=0;
  el.innerHTML='<div class="hwcard">'
    +'<div class="hwtitle">'+T('wheelT')+'<span class="hwfree">'+esc(T('wheelFree'))+'</span></div>'

}
function doSpinHome(){
  if(SPINNING) return; SPINNING=true;
  var b=document.getElementById("spinbtn"); if(b){ b.disabled=true; b.style.opacity=".6"; }
  var url=marketApi("/spin"), initData=(tg&&tg.initData)||"";
  fetch(url+"?initData="+encodeURIComponent(initData))
    .then(function(r){return r.json();})
    .then(function(d){
      if(!(d&&d.ok)){ SPINNING=false; WSTAT={can:false}; paintHomeWheel(); return; }
      spinTo(d.index);
      setTimeout(function(){
        confetti(["🪙","🎉","🎡","✨","🎊"]); setCoins(d.coins);
        alertMsg(T('wheelWon').replace("{n}", nf(d.prize)));
        SPINNING=false; WSTAT={can:false};   // aylantirildi -> yo'qoladi
        var el=document.getElementById("homewheel");
        if(el){ el.style.transition="opacity .45s,transform .45s"; el.style.opacity="0"; el.style.transform="scale(.9)";
          setTimeout(function(){ if(view.name==="home") paintHomeWheel(); }, 460); }
      }, 4600);
    })
    .catch(function(){ SPINNING=false; alertMsg(T('err')); });
}
var WCOLS=["#7c1c3a","#a83557","#4f46e5","#059669","#d97706","#2563eb","#9333ea","#e11d48"];
function wheelBg(){
  var n=WSEG.length||1, seg=360/n, st=[], mx=Math.max.apply(null,WSEG.length?WSEG:[0]);
  for(var i=0;i<n;i++){
    var col=(WSEG[i]===mx&&mx>=100000)?"#f5b301":WCOLS[i%WCOLS.length];
    st.push(col+" "+(i*seg)+"deg "+((i+1)*seg)+"deg");
  }
  return "conic-gradient("+st.join(",")+")";
}
function fmtDur(s){ s=Math.max(0,s|0); var h=(s/3600)|0,m=((s%3600)/60)|0,x=s%60;
  function p(n){return (n<10?"0":"")+n;} return p(h)+":"+p(m)+":"+p(x); }
function spinTo(i){
  var n=WSEG.length||1, seg=360/n;
  var base=WROT-(WROT%360);
  var target=base+360*5+(360-(i*seg+seg/2));
  while(target<=WROT+360*4) target+=360;
  WROT=target;
  var f=document.getElementById("wface"); if(f) f.style.transform="rotate("+WROT+"deg)";
}
function startWTimer(sec){
  if(WTIMER) clearInterval(WTIMER);
  var left=sec|0;
  WTIMER=setInterval(function(){
    var el=document.getElementById("wtimer");
    if(!el||view.name!=="wheel"){ clearInterval(WTIMER); WTIMER=null; return; }
    left--; if(left<=0){ clearInterval(WTIMER); WTIMER=null; renderWheel(); return; }
    el.textContent=fmtDur(left);
  },1000);
}
function renderWheel(){
  var backBtn='<button class="btn sec" onclick="go(\'coins\')">'+T('back')+'</button>';
  var head=header()+'<button class="back" onclick="go(\'coins\')">'+T('back')+'</button>'
    +'<h2>'+T('wheelT')+'</h2>';
  app.innerHTML=head+skel(3)+backBtn;
  var url=marketApi("/wheel"), initData=(tg&&tg.initData)||"";
  if(!url||!initData){ app.innerHTML=head+'<div class="content muted">'+esc(T('err'))+'</div>'+backBtn; return; }
  fetch(url+"?initData="+encodeURIComponent(initData))
    .then(function(r){return r.json();})
    .then(function(d){
      WSEG=(d&&d.segments)||[]; WROT=0;
      if(d&&d.coins!=null) setCoins(d.coins);
      var n=WSEG.length||1, seg=360/n;
      var labs=WSEG.map(function(a,i){
        var ang=i*seg+seg/2;
        return '<span class="wlab" style="transform:translate(-50%,-50%) rotate('+ang+'deg) translateY(-84px)">'+nf(a)+'</span>';
      }).join("");
      var wheelHtml='<div class="wheelwrap"><div class="wptr"></div>'
        +'<div class="wheel"><div class="wface" id="wface" style="background:'+wheelBg()+'">'+labs+'</div></div>'
        +'<div class="whub">🎡</div></div>';
      var ctrl=(d&&d.can)
        ? '<button class="btn" id="spinbtn" onclick="doSpin()">'+T('wheelSpin')+'</button>'
        : '<button class="btn sec" disabled>'+T('wheelWait')+': <span id="wtimer">'+fmtDur(d&&d.wait||0)+'</span></button>';
      var note='<div class="content muted" style="text-align:center">'+esc(T('wheelFree'))+'</div>';
      app.innerHTML=head+wheelHtml+ctrl+note+backBtn;
      if(!(d&&d.can)) startWTimer(d&&d.wait||0);
    })
    .catch(function(){ app.innerHTML=head+'<div class="content muted">'+esc(T('err'))+'</div>'+backBtn; });
}
function doSpin(){
  if(SPINNING) return; SPINNING=true;
  var b=document.getElementById("spinbtn"); if(b){ b.disabled=true; b.style.opacity=".6"; }
  var url=marketApi("/spin"), initData=(tg&&tg.initData)||"";
  fetch(url+"?initData="+encodeURIComponent(initData))

    .then(function(d){
      if(!(d&&d.ok)){ SPINNING=false; renderWheel(); return; }
      spinTo(d.index);

// Nusxa olish (clipboard) + toast
function fallbackCopy(t){
  try{ var ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed";
    ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta); }catch(e){}
}
function copyText(t){
  var ok=function(){ haptic(); alertMsg(T('copied')); };
  try{ if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(ok,function(){ fallbackCopy(t); ok(); }); return; } }catch(e){}
  fallbackCopy(t); ok();
}

var CAB=null, PWSHOW=false, CABI=0;
function pwToggle(){ PWSHOW=!PWSHOW; cabView(); }   // faqat qayta chizadi (qayta yuklamaydi)
function cabSelChild(i){ CABI=i; PWSHOW=false; cabView(); }
function cabView(){
  var d=CAB||{};
  var children=d.children||[];
  var backBtn='<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
  var head=header()+'<button class="back" onclick="go(\'home\')">'+T('back')+'</button>';
  if(!d.found || !children.length){
    var u=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user)||{};
    app.innerHTML=head+profHero(u.username?('@'+u.username):null,null)
      +statTiles(d.coins, d.rank, d.invited)
      +'<div class="content">'+esc(T('cabNone'))+'</div>'
      +'<button class="btn" onclick="enroll()">'+T('enroll')+'</button>'+backBtn;
    return;
  }
  if(CABI>=children.length) CABI=0;
  var ch=children[CABI];
  // Bir nechta farzand — tanlagich
  var sel="";
  if(children.length>1){
    sel='<div class="childsel">'+children.map(function(c,i){
      return '<button class="chip'+(i===CABI?" on":"")+'" onclick="cabSelChild('+i+')">'
        +esc(c.name||("#"+(i+1)))+'</button>';
    }).join("")+'</div>';
  }
  var c=ch.cert, hasCert=c&&/^https?:/.test(c);
  var hero=profHero(ch.name||ch.course||"", ch.type||"");
  var stats=statTiles(d.coins, d.rank, d.invited);
  // Ma'lumot kartasi
  var info='<div class="pcard"><div class="ph">👤 '+esc(T('acc'))+'</div>';
  if(ch.name) info+=crow(T('lName'), ch.name, false, false);
  if(ch.course) info+=crow(T('lCourse'), ch.course, false, false);
  if(ch.type) info+=crow(T('lType'), ch.type, false, false);
  info+='</div>';
  // LMS ma'lumotlari (qutili, nusxa + parol yashirish)
  var creds="";
  if(ch.login||ch.parol||ch.schedule){
    creds='<div class="pcard"><div class="ph">'+esc(T('cabCreds'))+'</div>';
    if(ch.login) creds+=credRow(T('lLogin'), ch.login, false);
    if(ch.parol) creds+=credRow(T('lPass'), ch.parol, true);
    if(ch.schedule) creds+=crow(T('lSched'), ch.schedule, false, false);
    creds+='</div>';
  }
  // Sertifikat
  var certcard='<div class="pcard"><div class="ph">'+esc(T('lCert'))+'</div>'
    +'<div class="crow"><span class="cl">'
    +esc(hasCert?T('cabCertReady'):(c||T('certNone')))+'</span></div></div>';
  // Tez amallar
  var quick='<div class="qgrid">'
    +qtile("🌐","LMS","openLmsSite()")
    +qtile("🎓","Sertifikat",hasCert?("openUrl('"+esc(c)+"')"):"",!hasCert)
    +qtile("🛒","Market","go('market')")
    +qtile("🎁",shortName(T('tabFriends')),"go('refer')")
    +'</div>';
  app.innerHTML=head+sel+'<div class="stg">'+hero+stats+levelCard(d.level)+quick+info+creds+certcard+'</div>'+backBtn;
}

  var api=(DATA.links&&DATA.links.cabinet_api)||"";

    .then(function(d){
      if(d&&d.ok){ if(SHOP)SHOP.coins=d.coins; render(); confetti(["🎁","🎉","✨","🛍️"]);
        alertMsg(T('mBought').replace("{code}", d.code)); setCoins(d.coins); }
      else if(d&&d.error==="poor"){ if(d.coins!=null){ if(SHOP)SHOP.coins=d.coins; setCoins(d.coins); } alertMsg(T('mPoor').replace("{need}", nf(d.need))); }
      else { alertMsg(T('err')); }
    })
    .catch(function(){ alertMsg(T('err')); });
}
function renderPurchases(){
  var backBtn='<button class="btn sec" onclick="go(\'coins\')">'+T('back')+'</button>';
  var head=header()+'<button class="back" onclick="go(\'coins\')">'+T('back')+'</button>'
    +'<h2>'+T('myBuys')+'</h2>';
  app.innerHTML=head+skel(4)+backBtn;
  var url=marketApi("/purchases"), initData=(tg&&tg.initData)||"";
  if(!url||!initData){ app.innerHTML=head+'<div class="content muted">'+esc(T('err'))+'</div>'+backBtn; return; }
  fetch(url+"?initData="+encodeURIComponent(initData))
    .then(function(r){return r.json();})
    .then(function(d){
      var list=(d&&d.purchases)||[];
      var body;
      if(!list.length){ body='<div class="content muted">'+esc(T('noBuys'))+'</div>'; }
      else{
        body=list.map(function(p){
          var st=p.redeemed?T('buyRedeemed'):T('buyPending');
          return '<div class="rev"><div class="who">'+(p.emoji||'🎁')+' '+esc(p.name)+'</div>'
            +'<div class="muted" style="margin:2px 0">'+T('buyCode')+': <b>'+esc(p.code)+'</b></div>'
            +'<div class="muted">🪙 '+nf(p.cost)+' · '+esc(p.date)+' · '+st+'</div></div>';
        }).join("")
        +'<div class="content muted" style="text-align:center">'+esc(T('buysHint'))+'</div>';
      }
      app.innerHTML=head+'<div class="stg">'+body+'</div>'+backBtn;
    })
    .catch(function(){ app.innerHTML=head+'<div class="content muted">'+esc(T('err'))+'</div>'+backBtn; });
}
function go(name,code){ view={name:name,code:code,tab:"about"}; window.scrollTo(0,0); render(); }
function setTab(t){ view.tab=t; render(); }
function setLang(l){ LANG=l; try{document.documentElement.lang=l;}catch(e){} render(); }
function openTg(u){ var url="https://t.me/"+String(u||"").replace("@","");
  if(tg&&tg.openTelegramLink)tg.openTelegramLink(url); else window.open(url,"_blank"); }
function enroll(){ openTg((DATA.links&&DATA.links.signup)||""); }

function detectLang(){
  try{ var l=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&tg.initDataUnsafe.user.language_code)||"uz";
       if(l.indexOf("ru")===0)return"ru"; if(l.indexOf("en")===0)return"en"; }catch(e){}
  return "uz";
}

fetch("content.json?_="+Date.now())
  .then(function(r){ return r.json(); })
  .then(function(d){ DATA=d; LANG=detectLang(); render(); claimDaily(); captureRef();
    setInterval(function(){
      var bs=banners();
      if(view.name==="home"&&bs.length>1){ BIDX=BIDX+1; paintBanner(); }
    }, 4500);
  })
  .catch(function(){ app.innerHTML='<div class="muted">'+T('err')+'</div>'; });
</script>
</body>
</html>
