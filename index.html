<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Singapore Skills Academy</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root, body.light{
    --sec:#f0f0f4; --text:#141416; --hint:#8b8b90;
    --link:#2f8fed; --btn:#7c1c3a; --btn-text:#ffffff; --accent:#7c1c3a; --card:#ffffff;
    --line:#e3e2e8;
  }
  body.dark{
    --sec:#0e0f12; --text:#f0f0f2; --hint:#9a9aa0;
    --link:#6ab3f3; --btn:#a83557; --btn-text:#ffffff; --accent:#e86f92; --card:#1c1d22;
    --line:#2b2c31;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--sec);color:var(--text);font-size:16px;line-height:1.5}
  .wrap{max-width:600px;margin:0 auto;padding:12px 12px 48px}
  header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
  .brand{font-weight:800;font-size:17px;color:var(--accent);line-height:1.15}
  .brand small{display:block;font-weight:500;color:var(--hint);font-size:11px;margin-top:2px}
  .langs{display:flex;gap:5px;flex-shrink:0}
  .lang{border:none;background:var(--card);color:var(--text);border:1px solid var(--line);
        border-radius:18px;padding:5px 10px;font-size:13px;cursor:pointer;font-weight:600}
  .lang.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .lang.avatar{padding:0;overflow:hidden;width:32px;height:32px;border-radius:50%}
  .lang.avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .lang.avatar.ini{background:linear-gradient(135deg,var(--accent),#b03a5b);color:#fff;
        border:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .card{background:var(--card);border-radius:16px;padding:16px;cursor:pointer;
        box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .08s}
  .card:active{transform:scale(.96)}
  .card .em{font-size:28px;line-height:1}
  .card .nm{font-weight:700;margin-top:10px;font-size:15px}
  .card .pr{color:var(--accent);font-size:13px;margin-top:3px;font-weight:600}
  .btn{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;
       font-weight:700;cursor:pointer;margin-top:10px;background:var(--btn);color:var(--btn-text)}
  .btn:active{opacity:.85}
  .btn.sec{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .tabs{display:flex;gap:6px;overflow-x:auto;margin:12px 0 10px;padding-bottom:2px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;border:none;background:var(--card);color:var(--text);
       border:1px solid var(--line);border-radius:18px;padding:8px 14px;font-size:14px;cursor:pointer}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .content{background:var(--card);border-radius:16px;padding:16px;font-size:15px;
           box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .content .row{margin:5px 0}
  .content b{font-weight:700}
  .content code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--sec);
                padding:2px 7px;border-radius:6px;font-size:14px}
  .back{display:inline-flex;align-items:center;gap:5px;background:var(--card);
        border:1px solid var(--line);color:var(--text);font-size:14px;cursor:pointer;
        padding:9px 16px;margin-bottom:10px;border-radius:20px;font-weight:600;
        box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .back:active{transform:scale(.96)}
  h2{font-size:21px;margin:4px 0 2px}
  .muted{color:var(--hint);font-size:14px}
  .rev{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;
       box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .rev .who{font-weight:700;margin-bottom:2px}
  .contact .row{margin:8px 0;font-size:15px}
  .contact a{color:var(--link);text-decoration:none}
  .srow{margin:6px 0 16px}
  .slbl{font-weight:700;margin-bottom:8px;font-size:15px}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="muted">Yuklanmoqda…</div></div>

<script>
"use strict";
var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

// Kunduzgi/tungi rejim
var THEME="light";
try{ THEME = localStorage.getItem("ssa_theme") || ((tg && tg.colorScheme==="dark")?"dark":"light"); }catch(e){}
function applyTheme(){ document.body.classList.remove("light","dark"); document.body.classList.add(THEME); }
function toggleTheme(){ THEME=(THEME==="dark")?"light":"dark";
  try{localStorage.setItem("ssa_theme",THEME);}catch(e){} applyTheme(); render(); }
applyTheme();

// Tugma bosilganda ovoz + tebranish
var SOUND="on", AC=null;
try{ SOUND = (localStorage.getItem("ssa_sound")==="off")?"off":"on"; }catch(e){}
function beep(){
  if(SOUND!=="on") return;
  try{
    if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    var o=AC.createOscillator(), g=AC.createGain();
    o.type="triangle"; o.frequency.setValueAtTime(660,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(440,AC.currentTime+0.08);
    g.gain.setValueAtTime(0.0001,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18,AC.currentTime+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.12);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+0.13);
  }catch(e){}
}
function haptic(){ try{ if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light"); }catch(e){} }
function toggleSound(){ SOUND=(SOUND==="on")?"off":"on";
  try{localStorage.setItem("ssa_sound",SOUND);}catch(e){} if(SOUND==="on")beep(); render(); }
function setTheme(v){ THEME=v; try{localStorage.setItem("ssa_theme",v);}catch(e){} applyTheme(); render(); }
function setSound(v){ SOUND=v; try{localStorage.setItem("ssa_sound",v);}catch(e){} if(v==="on")beep(); render(); }
document.addEventListener("click", function(e){
  var el=e.target.closest && e.target.closest(".btn,.lang,.tab,.card,.back,.rev");
  if(el){ beep(); haptic(); }
}, true);

var UI = {
  uz:{choose:"Bo'limni tanlang",about:"Kurs haqida",plan:"O'quv reja",price:"Narx",faq:"Savol-javob",
      enroll:"📝 Kursga yozilish",contact:"📞 Bog'lanish",reviews:"⭐ Sharhlar",back:"‹ Orqaga",
      addrev:"✍️ Sharh qoldirish",cabinet:"📱 Shaxsiy kabinet",loading:"Yuklanmoqda…",
      lName:"👤 Farzand",lCourse:"📚 Kurs",lType:"🏷 Yo'nalish",lLogin:"🔐 LMS login",lPass:"🔑 Parol",
      lSched:"📅 Dars jadvali",lCert:"🎓 Sertifikat",certNone:"hali tayyor emas",lmsGo:"🌐 LMS saytiga kirish",
      cabNone:"Siz hali ro'yxatda yo'qsiz. Kursga yozilsangiz — ma'lumotlaringiz shu yerda chiqadi.",
      acc:"Akkaunt",cabFull:"🔐 To'liq ma'lumot (botda)",
      cabHint:"LMS login, parol, dars jadvali va sertifikat — botda ko'rsatiladi 👇",
      top:"🏆 Reyting",topTitle:"🏆 Do'st taklif reytingi",tInv:"taklif",tEnr:"yozildi",
      topEmpty:"Hali reyting bo'sh. Do'st taklif qilib birinchi bo'ling! 🎁",
      refer:"🎁 Do'st taklif qilish",referTitle:"🎁 Do'stingizni taklif qiling",
      yourLink:"🔗 Shaxsiy havolangiz:",shareBtn:"📤 Do'stga ulashish",
      shareText:"Farzandingiz uchun IT, English, Math, Science kurslari! 👇",
      referHow:"Do'stingiz havola orqali kirib kursga yozilsa — **sizga bonus!** 💸\nIT: 200 000 so'm • boshqa fanlar: 60 000 so'm",
      settings:"⚙️ Sozlamalar",sLang:"🌐 Til",sTheme:"🎨 Ko'rinish",sSound:"🔊 Ovoz",
      day:"☀️ Kunduzgi",night:"🌙 Tungi",on:"🔊 Yoniq",off:"🔇 O'chiq",
      norev:"Hali sharhlar yo'q.",per:"oy",err:"Ma'lumot topilmadi. Bot ishga tushirilganini tekshiring."},
  ru:{choose:"Выберите раздел",about:"О курсе",plan:"Учебный план",price:"Цена",faq:"Вопросы",
      enroll:"📝 Записаться",contact:"📞 Связаться",reviews:"⭐ Отзывы",back:"‹ Назад",
      addrev:"✍️ Оставить отзыв",cabinet:"📱 Личный кабинет",loading:"Загрузка…",
      lName:"👤 Ребёнок",lCourse:"📚 Курс",lType:"🏷 Направление",lLogin:"🔐 LMS логин",lPass:"🔑 Пароль",
      lSched:"📅 Расписание",lCert:"🎓 Сертификат",certNone:"ещё не готов",lmsGo:"🌐 Войти на LMS",
      cabNone:"Вас пока нет в списке. Запишитесь на курс — и данные появятся здесь.",
      acc:"Аккаунт",cabFull:"🔐 Полная информация (в боте)",
      cabHint:"LMS логин, пароль, расписание и сертификат — в боте 👇",
      top:"🏆 Рейтинг",topTitle:"🏆 Рейтинг приглашений",tInv:"приглашено",tEnr:"записалось",
      topEmpty:"Рейтинг пока пуст. Пригласите друга и станьте первым! 🎁",
      refer:"🎁 Пригласить друга",referTitle:"🎁 Пригласите друга",
      yourLink:"🔗 Ваша персональная ссылка:",shareBtn:"📤 Поделиться с другом",
      shareText:"Курсы IT, English, Math, Science для вашего ребёнка! 👇",
      referHow:"Если друг перейдёт по ссылке и запишется — **вам бонус!** 💸\nIT: 200 000 сум • другие предметы: 60 000 сум",
      settings:"⚙️ Настройки",sLang:"🌐 Язык",sTheme:"🎨 Тема",sSound:"🔊 Звук",
      day:"☀️ Светлая",night:"🌙 Тёмная",on:"🔊 Вкл",off:"🔇 Выкл",
      norev:"Отзывов пока нет.",per:"мес",err:"Данные не найдены. Проверьте, запущен ли бот."},
  en:{choose:"Choose a section",about:"About",plan:"Curriculum",price:"Price",faq:"FAQ",
      enroll:"📝 Enroll",contact:"📞 Contact",reviews:"⭐ Reviews",back:"‹ Back",
      addrev:"✍️ Leave a review",cabinet:"📱 My account",loading:"Loading…",
      lName:"👤 Child",lCourse:"📚 Course",lType:"🏷 Track",lLogin:"🔐 LMS login",lPass:"🔑 Password",
      lSched:"📅 Schedule",lCert:"🎓 Certificate",certNone:"not ready yet",lmsGo:"🌐 Go to LMS",
      cabNone:"You're not on the list yet. Enroll and your details will appear here.",
      acc:"Account",cabFull:"🔐 Full details (in bot)",
      cabHint:"LMS login, password, schedule and certificate — in the bot 👇",
      top:"🏆 Leaderboard",topTitle:"🏆 Referral leaderboard",tInv:"invited",tEnr:"enrolled",
      topEmpty:"Leaderboard is empty. Invite a friend and be the first! 🎁",
      refer:"🎁 Invite a friend",referTitle:"🎁 Invite your friend",
      yourLink:"🔗 Your personal link:",shareBtn:"📤 Share with a friend",
      shareText:"IT, English, Math, Science courses for your child! 👇",
      referHow:"If your friend opens the link and enrolls — **you get a bonus!** 💸\nIT: 200 000 UZS • other subjects: 60 000 UZS",
      settings:"⚙️ Settings",sLang:"🌐 Language",sTheme:"🎨 Theme",sSound:"🔊 Sound",
      day:"☀️ Light",night:"🌙 Dark",on:"🔊 On",off:"🔇 Off",
      norev:"No reviews yet.",per:"mo",err:"Data not found. Make sure the bot is running."}
};
var EMOJI={math:"🔢",english:"📖",science:"🔬",literacy:"✍️",it:"💻"};
var NAME={math:"Junior Math",english:"Junior English",science:"Junior Science",literacy:"Junior Literacy",it:"IT"};
var CUR={uz:"so'm",ru:"сум",en:"UZS"};

var DATA=null, LANG="uz";
var view={name:"home"};           // {name:'home'|'sec'|'contact'|'reviews', code, tab}
var app=document.getElementById('app');

function T(k){ return (UI[LANG]||UI.uz)[k]; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function money(n){ return String(n).replace(/\B(?=(\d{3})+(?!\d))/g," ")+" "+CUR[LANG]; }
// **bold** -> <b>, `x` -> <b>, qatorlarni saqlaydi
function fmt(s){
  var safe=esc(s);
  safe=safe.replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/`(.+?)`/g,"<b>$1</b>");
  return safe.split("\n").map(function(l){return '<div class="row">'+(l||"&nbsp;")+'</div>';}).join("");
}
function nameOf(code){
  var s=DATA.subjects[code];
  var t=(s&&s.title)||NAME[code]||code;
  return t.replace(/^[\u{1F000}-\u{1FAFF}☀-➿]\s*/u,""); // bosh emojini olib tashlaymiz
}

function header(){
  var gear='<button class="lang" title="'+T('settings')+'" onclick="go(\'settings\')">⚙️</button>';
  var us=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user)||{};
  var pu=us.photo_url||"";
  var nm=(us.first_name||us.username||"").trim();
  var ini=nm?nm.charAt(0).toUpperCase():"";
  var cab = pu
    ? '<button class="lang avatar" title="'+T('cabinet')+'" onclick="openCabinet()"><img src="'+esc(pu)+'"></button>'
    : '<button class="lang avatar ini" title="'+T('cabinet')+'" onclick="openCabinet()">'+(esc(ini)||'👤')+'</button>';
  var logo=(THEME==="dark")?"logo-white.png":"logo-color.png";
  return '<header>'
       + '<div class="langs">'+gear+'</div>'
       + '<div class="brand" style="flex:1;text-align:center">'
       +   '<img src="'+logo+'" alt="Singapore Skills Academy" '
       +   'style="height:30px;max-width:78%;object-fit:contain;vertical-align:middle"></div>'
       + '<div class="langs">'+cab+'</div></header>';
}

function render(){
  if(!DATA){ app.innerHTML='<div class="muted">'+T('err')+'</div>'; return; }
  if(view.name==="sec") return renderSec();
  if(view.name==="contact") return renderContact();
  if(view.name==="reviews") return renderReviews();
  if(view.name==="cabinet") return renderCabinet();
  if(view.name==="settings") return renderSettings();
  if(view.name==="top") return renderTop();
  if(view.name==="refer") return renderRefer();
  return renderHome();
}

function renderHome(){
  var cards=(DATA.sections||[]).map(function(code){
    var pr=DATA.prices[code]?('<div class="pr">'+money(DATA.prices[code])+' / '+T('per')+'</div>'):'';
    return '<div class="card" onclick="go(\'sec\',\''+code+'\')"><div class="em">'+(EMOJI[code]||"📚")
         +'</div><div class="nm">'+esc(nameOf(code))+'</div>'+pr+'</div>';
  }).join("");
  app.innerHTML=header()
    +'<div class="muted" style="margin-bottom:10px">'+T('choose')+'</div>'
    +'<div class="grid">'+cards+'</div>'
    +'<button class="btn" onclick="enroll()">'+T('enroll')+'</button>'
    +'<button class="btn" onclick="go(\'refer\')">'+T('refer')+'</button>'
    +'<button class="btn sec" onclick="go(\'top\')">'+T('top')+'</button>'
    +'<button class="btn sec" onclick="go(\'reviews\')">'+T('reviews')+'</button>'
    +'<button class="btn sec" onclick="go(\'contact\')">'+T('contact')+'</button>';
}

function renderSec(){
  var code=view.code, s=DATA.subjects[code];
  var isIT=(code==="it"), it=DATA.it_info||{};
  var tabsAll=isIT?["about","price","faq"]:(s?["about","plan","price","faq"]:["price","faq"]);
  if(tabsAll.indexOf(view.tab)<0) view.tab=tabsAll[0];
  var body;
  if(isIT){
    if(view.tab==="price") body=fmt(it.price||"");
    else if(view.tab==="faq") body=fmt(DATA.faq[LANG]);
    else body=fmt(it.about||"");
  } else if(view.tab==="price") body=fmt(DATA.price_text[LANG]);
  else if(view.tab==="faq") body=fmt(DATA.faq[LANG]);
  else body=fmt(s[view.tab][LANG]);
  var tabsHtml=tabsAll.map(function(tb){
    return '<button class="tab '+(tb===view.tab?'active':'')+'" onclick="setTab(\''+tb+'\')">'+T(tb)+'</button>';
  }).join("");
  app.innerHTML=header()
    +'<button class="back" onclick="go(\'home\')">'+T('back')+'</button>'
    +'<h2>'+(EMOJI[code]||"")+' '+esc(nameOf(code))+'</h2>'
    +'<div class="tabs">'+tabsHtml+'</div>'
    +'<div class="content">'+body+'</div>'
    +'<button class="btn" onclick="enroll()">'+T('enroll')+'</button>'
    +'<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
}

function renderContact(){
  var c=DATA.contact||{};
  var tgu=String(c.telegram||"").replace("@","");
  app.innerHTML=header()
    +'<button class="back" onclick="go(\'home\')">'+T('back')+'</button>'
    +'<h2>'+T('contact')+'</h2>'
    +'<div class="content contact">'
    +'<div class="row">☎️ <a href="tel:'+esc((c.phone||"").replace(/\s/g,""))+'">'+esc(c.phone)+'</a></div>'
    +'<div class="row">🌐 <a target="_blank" href="https://'+esc((c.site||"").replace(/^https?:\/\//,""))+'">'+esc(c.site)+'</a></div>'
    +'<div class="row">✈️ <a target="_blank" href="https://t.me/'+esc(tgu)+'">'+esc(c.telegram)+'</a></div>'
    +'</div>'
    +'<button class="btn" onclick="openTg(\''+esc(c.telegram)+'\')">'+T('contact')+'</button>'
    +'<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
}

function renderReviews(){
  var rv=DATA.reviews||[];
  var body=rv.length?rv.map(function(r){
      return '<div class="rev"><div class="who">⭐ '+esc(r.name||"")+'</div><div>'+esc(r.text||"")+'</div></div>';
    }).join(""):'<div class="muted">'+T('norev')+'</div>';
  app.innerHTML=header()
    +'<button class="back" onclick="go(\'home\')">'+T('back')+'</button>'
    +'<h2>'+T('reviews')+'</h2>'
    +'<button class="btn" onclick="writeReview()">'+T('addrev')+'</button>'
    +'<div style="height:8px"></div>'+body
    +'<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
}
function openBot(param){
  var bot=(DATA.links&&DATA.links.bot)||"";
  if(!bot){ return; }
  var url=bot+(param?("?start="+param):"");
  if(tg&&tg.openTelegramLink) tg.openTelegramLink(url); else window.open(url,"_blank");
}
function writeReview(){ openBot("review"); }
function openCabinet(){ go("cabinet"); }   // har doim ilova ichida
function openLmsSite(){ var u=(DATA.links&&DATA.links.lms)||"";
  if(u){ if(tg&&tg.openLink) tg.openLink(u); else window.open(u,"_blank"); } }

// Backend'siz — Telegram profil + botga to'liq ma'lumot tugmasi
function cabinetLite(head, backBtn){
  var u=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user)||{};
  var name=((u.first_name||"")+" "+(u.last_name||"")).trim();
  var rows="";
  if(name) rows+='<div class="row"><b>👤 '+T('acc')+':</b> '+esc(name)+'</div>';
  if(u.username) rows+='<div class="row"><b>🔗 Username:</b> @'+esc(u.username)+'</div>';
  rows+='<div class="row muted" style="margin-top:10px">'+esc(T('cabHint'))+'</div>';
  var body='<div class="content">'+rows+'</div>'
    +'<button class="btn" onclick="openBot(\'cabinet\')">'+T('cabFull')+'</button>'
    +'<button class="btn sec" onclick="openLmsSite()">'+T('lmsGo')+'</button>';
  app.innerHTML=head+body+backBtn;
}

function renderCabinet(){
  var api=(DATA.links&&DATA.links.cabinet_api)||"";
  var top='<button class="back" onclick="go(\'home\')">'+T('back')+'</button>';
  var backBtn='<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
  var head=header()+top+'<h2>'+T('cabinet')+'</h2>';
  if(!api){ cabinetLite(head, backBtn); return; }   // backend yo'q -> lite
  app.innerHTML=head+'<div class="content muted">'+T('loading')+'</div>';
  var initData=(tg&&tg.initData)||"";
  fetch(api+"?initData="+encodeURIComponent(initData))
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d || d.error){ cabinetLite(head, backBtn); return; }   // xato -> lite
      var body;
      if(!d.found){
        body='<div class="content">'+esc(T('cabNone'))+'</div>'
            +'<button class="btn" onclick="enroll()">'+T('enroll')+'</button>';
      } else {
        var rows=[];
        function add(lbl,val,mono){ if(val) rows.push('<div class="row"><b>'+lbl
          +':</b> '+(mono?'<code>'+esc(val)+'</code>':esc(val))+'</div>'); }
        add(T('lName'),d.name); add(T('lCourse'),d.course); add(T('lType'),d.type);
        add(T('lLogin'),d.login,true); add(T('lPass'),d.parol,true);
        add(T('lSched'),d.schedule);
        var c=d.cert; add(T('lCert'), (c && /^https?:/.test(c))? c : (c||T('certNone')));
        body='<div class="content">'+rows.join("")+'</div>'
            +'<button class="btn" onclick="openLmsSite()">'+T('lmsGo')+'</button>';
        if(c && /^https?:/.test(c)) body+='<button class="btn sec" onclick="window.open(\''+esc(c)+'\',\'_blank\')">'+T('lCert')+'</button>';
      }
      app.innerHTML=head+body+backBtn;
    })
    .catch(function(){ cabinetLite(head, backBtn); });
}

function renderSettings(){
  var top='<button class="back" onclick="go(\'home\')">'+T('back')+'</button>';
  function opt(active,onclick,label){
    return '<button class="tab '+(active?'active':'')+'" onclick="'+onclick+'">'+label+'</button>'; }
  var langRow=["uz","ru","en"].map(function(l){
    return opt(l===LANG,"setLang('"+l+"')",l.toUpperCase()); }).join(" ");
  var themeRow=opt(THEME==="light","setTheme('light')",T('day'))+" "
              +opt(THEME==="dark","setTheme('dark')",T('night'));
  var soundRow=opt(SOUND==="on","setSound('on')",T('on'))+" "
              +opt(SOUND==="off","setSound('off')",T('off'));
  app.innerHTML=header()+top+'<h2>'+T('settings')+'</h2>'
    +'<div class="content">'
    +'<div class="srow"><div class="slbl">'+T('sLang')+'</div><div class="tabs">'+langRow+'</div></div>'
    +'<div class="srow"><div class="slbl">'+T('sTheme')+'</div><div class="tabs">'+themeRow+'</div></div>'
    +'<div class="srow"><div class="slbl">'+T('sSound')+'</div><div class="tabs">'+soundRow+'</div></div>'
    +'</div>'
    +'<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
}
function myRefLink(){
  var u=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user)||{};
  var bot=(DATA.links&&DATA.links.bot)||"";
  return (u.id&&bot)?(bot+"?start=ref"+u.id):bot;
}
function shareLink(){
  var url="https://t.me/share/url?url="+encodeURIComponent(myRefLink())
        +"&text="+encodeURIComponent(T('shareText'));
  if(tg&&tg.openTelegramLink) tg.openTelegramLink(url); else window.open(url,"_blank");
}
function renderRefer(){
  var top='<button class="back" onclick="go(\'home\')">'+T('back')+'</button>';
  var backBtn='<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
  var body='<div class="content">'+fmt(T('referHow'))
    +'<div class="row" style="margin-top:12px"><b>'+T('yourLink')+'</b></div>'
    +'<div class="row"><code>'+esc(myRefLink())+'</code></div></div>'
    +'<button class="btn" onclick="shareLink()">'+T('shareBtn')+'</button>'
    +'<button class="btn sec" onclick="go(\'top\')">'+T('top')+'</button>';
  app.innerHTML=header()+top+'<h2>'+T('referTitle')+'</h2>'+body+backBtn;
}

function renderTop(){
  var lb=DATA.leaderboard||[];
  var top='<button class="back" onclick="go(\'home\')">'+T('back')+'</button>';
  var backBtn='<button class="btn sec" onclick="go(\'home\')">'+T('back')+'</button>';
  var medals=["🥇","🥈","🥉"];
  var body = lb.length
    ? lb.map(function(r,i){
        var rank=(i<3)?medals[i]:('<b>#'+(i+1)+'</b>');
        return '<div class="rev"><div class="who">'+rank+' '+esc(r.name||'Anonim')+'</div>'
          +'<div class="muted">👥 '+r.invited+' '+T('tInv')+' • ✅ <b>'+r.enrolled+'</b> '+T('tEnr')+'</div></div>';
      }).join("")
    : '<div class="content muted">'+esc(T('topEmpty'))+'</div>';
  app.innerHTML=header()+top+'<h2>'+T('topTitle')+'</h2>'+body+backBtn;
}

function go(name,code){ view={name:name,code:code,tab:"about"}; window.scrollTo(0,0); render(); }
function setTab(t){ view.tab=t; render(); }
function setLang(l){ LANG=l; try{document.documentElement.lang=l;}catch(e){} render(); }
function openTg(u){ var url="https://t.me/"+String(u||"").replace("@","");
  if(tg&&tg.openTelegramLink)tg.openTelegramLink(url); else window.open(url,"_blank"); }
function enroll(){ openTg((DATA.links&&DATA.links.signup)||""); }

function detectLang(){
  try{ var l=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&tg.initDataUnsafe.user.language_code)||"uz";
       if(l.indexOf("ru")===0)return"ru"; if(l.indexOf("en")===0)return"en"; }catch(e){}
  return "uz";
}

fetch("content.json?_="+Date.now())
  .then(function(r){ return r.json(); })
  .then(function(d){ DATA=d; LANG=detectLang(); render(); })
  .catch(function(){ app.innerHTML='<div class="muted">'+T('err')+'</div>'; });
</script>
</body>
</html>
