<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Singapore Skills Academy</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #ffffff);
    --sec: var(--tg-theme-secondary-bg-color, #f4f4f7);
    --text: var(--tg-theme-text-color, #1a1a1a);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --link: var(--tg-theme-link-color, #2f8fed);
    --btn: var(--tg-theme-button-color, #2f8fed);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --accent: #7c1c3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--text);font-size:16px;line-height:1.45}
  .wrap{max-width:640px;margin:0 auto;padding:14px 14px 40px}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .brand{font-weight:800;font-size:18px}
  .brand small{display:block;font-weight:500;color:var(--hint);font-size:12px}
  .langs{display:flex;gap:6px}
  .lang{border:none;background:var(--sec);color:var(--text);border-radius:20px;
        padding:6px 10px;font-size:13px;cursor:pointer}
  .lang.active{background:var(--btn);color:var(--btn-text)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:var(--sec);border-radius:16px;padding:16px;cursor:pointer;
        border:1px solid transparent;transition:transform .08s}
  .card:active{transform:scale(.97)}
  .card .emoji{font-size:30px}
  .card .name{font-weight:700;margin-top:8px}
  .card .price{color:var(--hint);font-size:13px;margin-top:2px}
  .btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-size:16px;
       font-weight:600;cursor:pointer;margin-top:10px;background:var(--btn);color:var(--btn-text)}
  .btn.sec{background:var(--sec);color:var(--text)}
  .tabs{display:flex;gap:6px;overflow-x:auto;margin:14px 0 10px;padding-bottom:4px}
  .tab{white-space:nowrap;border:none;background:var(--sec);color:var(--text);
       border-radius:20px;padding:8px 14px;font-size:14px;cursor:pointer}
  .tab.active{background:var(--accent);color:#fff}
  .content{background:var(--sec);border-radius:16px;padding:16px;white-space:pre-wrap;font-size:15px}
  .content b,.content strong{font-weight:700}
  .back{background:none;border:none;color:var(--link);font-size:15px;cursor:pointer;
        padding:6px 0;margin-bottom:8px}
  h2{font-size:20px;margin:6px 0 2px}
  .muted{color:var(--hint);font-size:13px}
  .rev{background:var(--sec);border-radius:14px;padding:12px;margin-bottom:8px}
  .rev .who{font-weight:700}
  .contact a{color:var(--link);text-decoration:none}
  .contact div{margin:6px 0}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="muted">Yuklanmoqda…</div></div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg){ tg.ready(); tg.expand(); }

const UI = {
  uz:{sections:"Bo'limlar",about:"Kurs haqida",plan:"O'quv reja",price:"Narx",faq:"Savol-javob",
      enroll:"📝 Kursga yozilish",contact:"📞 Bog'lanish",reviews:"⭐ Sharhlar",back:"‹ Orqaga",
      choose:"Bo'limni tanlang",norev:"Hali sharhlar yo'q."},
  ru:{sections:"Разделы",about:"О курсе",plan:"Учебный план",price:"Цена",faq:"Вопросы",
      enroll:"📝 Записаться",contact:"📞 Связаться",reviews:"⭐ Отзывы",back:"‹ Назад",
      choose:"Выберите раздел",norev:"Отзывов пока нет."},
  en:{sections:"Sections",about:"About",plan:"Curriculum",price:"Price",faq:"FAQ",
      enroll:"📝 Enroll",contact:"📞 Contact",reviews:"⭐ Reviews",back:"‹ Back",
      choose:"Choose a section",norev:"No reviews yet."}
};
const SEC_EMOJI = {math:"🔢",english:"📖",science:"🔬",literacy:"✍️",it:"💻"};
const SEC_NAME = {math:"Junior Math",english:"Junior English",science:"Junior Science",
                  literacy:"Junior Literacy",it:"💻 IT"};

let DATA=null, LANG="uz";
const app = document.getElementById('app');

// oddiy **bold** -> <b>
function md(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/`(.+?)`/g,"<b>$1</b>");}
function tr(k){return (UI[LANG]||UI.uz)[k];}

function detectLang(){
  try{ const l=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&tg.initDataUnsafe.user.language_code)||"uz";
       if(l.startsWith("ru"))return "ru"; if(l.startsWith("en"))return "en"; }catch(e){}
  return "uz";
}

function header(){
  return `<header>
    <div class="brand">Singapore Skills Academy<small>Junior courses • 5–7 yosh</small></div>
    <div class="langs">
      ${["uz","ru","en"].map(l=>`<button class="lang ${l===LANG?'active':''}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`).join("")}
    </div></header>`;
}

function home(){
  const secs = DATA.sections||[];
  const cards = secs.map(code=>{
    const price = DATA.prices[code]?money(DATA.prices[code]):"";
    const nm = (DATA.subjects[code]&&DATA.subjects[code].title)||SEC_NAME[code]||code;
    return `<div class="card" onclick="openSec('${code}')">
      <div class="emoji">${SEC_EMOJI[code]||"📚"}</div>
      <div class="name">${nm.replace(/^[^ ]+ /,'')}</div>
      <div class="price">${price?price+" / oy":""}</div></div>`;
  }).join("");
  app.innerHTML = header()
    + `<div class="muted" style="margin-bottom:10px">${tr('choose')}</div>`
    + `<div class="grid">${cards}</div>`
    + `<button class="btn" onclick="enroll()">${tr('enroll')}</button>`
    + `<button class="btn sec" onclick="openReviews()">${tr('reviews')}</button>`
    + `<button class="btn sec" onclick="openContact()">${tr('contact')}</button>`;
}

function money(n){const cur=LANG==="ru"?"сум":(LANG==="en"?"UZS":"so'm");
  return String(n).replace(/\B(?=(\d{3})+(?!\d))/g," ")+" "+cur;}

let curSec=null, curTab="about";
function openSec(code){curSec=code;curTab="about";renderSec();}
function renderSec(){
  const s=DATA.subjects[curSec];
  const tabs=["about","plan","price","faq"];
  let body="";
  if(curTab==="price") body=md(DATA.price_text[LANG]);
  else if(curTab==="faq") body=md(DATA.faq[LANG]);
  else if(s) body=md(s[curTab][LANG]);
  else body=md(DATA.price_text[LANG]); // IT — subject matni yo'q
  const nm=(s&&s.title)||SEC_NAME[curSec]||curSec;
  app.innerHTML = header()
    + `<button class="back" onclick="home()">${tr('back')}</button>`
    + `<h2>${nm}</h2>`
    + `<div class="tabs">${tabs.map(tb=>{
         if(!s && (tb==="about"||tb==="plan")) return ""; // IT: faqat narx/faq
         return `<button class="tab ${tb===curTab?'active':''}" onclick="setTab('${tb}')">${tr(tb)}</button>`;
       }).join("")}</div>`
    + `<div class="content">${body}</div>`
    + `<button class="btn" onclick="enroll()">${tr('enroll')}</button>`;
}
function setTab(t){curTab=t;renderSec();}

function openContact(){
  const c=DATA.contact||{};
  app.innerHTML = header()
    + `<button class="back" onclick="home()">${tr('back')}</button>`
    + `<h2>${tr('contact')}</h2>`
    + `<div class="content contact">
        <div>☎️ <a href="tel:${(c.phone||'').replace(/\s/g,'')}">${c.phone||''}</a></div>
        <div>🌐 <a href="https://${(c.site||'').replace(/^https?:\/\//,'')}" target="_blank">${c.site||''}</a></div>
        <div>✈️ <a href="https://t.me/${(c.telegram||'').replace('@','')}" target="_blank">${c.telegram||''}</a></div>
       </div>`
    + `<button class="btn" onclick="openTg(DATA.contact.telegram)">${tr('contact')}</button>`;
}

function openReviews(){
  const rv=DATA.reviews||[];
  const body = rv.length? rv.map(r=>`<div class="rev"><div class="who">⭐ ${esc(r.name||'')}</div><div>${esc(r.text||'')}</div></div>`).join("")
                        : `<div class="muted">${tr('norev')}</div>`;
  app.innerHTML = header()
    + `<button class="back" onclick="home()">${tr('back')}</button>`
    + `<h2>${tr('reviews')}</h2>${body}`;
}
function esc(s){return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function openTg(u){const url="https://t.me/"+String(u||"").replace("@","");
  if(tg&&tg.openTelegramLink)tg.openTelegramLink(url);else window.open(url,"_blank");}
function enroll(){openTg((DATA.links&&DATA.links.signup)||"");}

function setLang(l){LANG=l;const v=curSec?renderSec:home;home();}

fetch("content.json?_="+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d; LANG=detectLang(); home();
}).catch(e=>{ app.innerHTML="<div class='muted'>content.json topilmadi. Bot ishga tushirilganini tekshiring.</div>"; });
</script>
</body>
</html>
